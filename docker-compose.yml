services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fuzzy-doodle-php
    volumes:
      - .:/app
      - ./docker/php/php.dev.ini:/usr/local/etc/php/conf.d/app.ini:ro
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://app:secret@database:3306/app?serverVersion=8.4&charset=utf8mb4"

  nginx:
    image: nginx:1.27-alpine
    container_name: fuzzy-doodle-nginx
    ports:
      - "8080:80"
    volumes:
      - ./public:/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    image: mysql:8.4
    container_name: fuzzy-doodle-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fuzzy-doodle-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - nginx

volumes:
  db-data:
